
server:
  port: 9090
  servlet:
    context-path: /mt-app
spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/security_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: rootpassword

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  redis:
    host: localhost
    port: 6379
    timeout: 2000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,env,beans,loggers
    endpoint:
      health:
        show-details: when_authorized


aws:
  region: us-east-1
  s3:
    bucket: test-demo-bucket

