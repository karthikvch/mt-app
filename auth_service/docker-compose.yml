version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_DATABASE: security_service
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"

  security-service:
    image: security-service:1.0
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/security_service
